<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherScope Pro - GapGPT Edition</title>
    <link rel="stylesheet" href="style.css">
    <!-- کتابخانه‌های مورد نیاز -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="light-mode">

    <!-- کانتینر افکت‌های باران و برف -->
    <div id="tsparticles"></div>

    <!-- دکمه تغییر تم -->
    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon"></i>
    </div>

    <div class="container animate__animated animate__fadeIn">
        <!-- بخش جستجو -->
        <div class="search-section">
            <input type="text" id="cityInput" placeholder="Find your city...">
            <button id="searchBtn"><i class="fas fa-search-location"></i></button>
        </div>

        <!-- کارت اصلی آب و هوا -->
        <div class="weather-card" id="weatherCard" data-tilt>
            <div class="main-info">
                <div id="iconContainer" class="animate__animated animate__zoomIn">
                    <i id="weatherIcon" class="fas fa-sun weather-icon-large"></i>
                </div>
                <h1 id="temperature">--°C</h1>
                <h2 id="cityName">Enter a City</h2>
                <p id="description">Ready to check the weather?</p>
            </div>

            <div class="quote-box">
                <p id="weatherQuote">"Your vibe attracts your tribe."</p>
            </div>

            <!-- جزئیات اضافی -->
            <div class="extra-details">
                <div class="detail-item">
                    <i class="fas fa-tint"></i>
                    <div>
                        <span id="humidity">--%</span>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="detail-item">
                    <i class="fas fa-wind"></i>
                    <div>
                        <span id="wind">-- km/h</span>
                        <p>Wind</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- اسکریپت‌های کتابخانه‌ها -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-confetti@2.12.0/tsparticles.confetti.bundle.min.js"></script>
    <!-- اسکریپت اصلی پروژه -->
    <script src="script.js"></script>
</body>
</html>
